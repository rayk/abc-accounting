# Workspace root — not a published package; never released independently.
# Dart 3.12+ requires a name: field even for workspace roots.
name: abc_accounting_workspace
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

workspace:
  - abc_accounting
  - abc_accounting_impl
  - abc_accounting_contract

# The bnd_eac engine build has landed: the contract package pins it directly to
# rayk/bnd-eac (a SHA on feat/contract-authoring-engine). No override needed.
#
# To resume LOCAL engine edits, re-add an override pointing at the working copy:
#   dependency_overrides:
#     bnd_eac:
#       path: /Users/rayk/bounded-fixtures/bnd-eac
# then re-pin abc_accounting_contract/pubspec.yaml to a new full SHA and remove
# the override again when done (CONTRACT_AUTHORING_SPEC dev loop).
