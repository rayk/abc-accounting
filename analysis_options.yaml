# Strict analysis befitting a reference exemplar: the config is part of what is
# being demonstrated. Built on very_good_analysis (the shared base ruleset) plus
# the bnd_lints analyzer plugin (the lc-stack rules); the settings below are the
# intentional, documented deviations from that base.
include: package:very_good_analysis/analysis_options.yaml

# bnd_lints is the lc-stack analyzer plugin (first-party analysis_server_plugin),
# consumed from the private pub registry. The analyzer resolves a plugin's plain
# version constraint via pub's DEFAULT server, so this requires
# PUB_HOSTED_URL=https://192.168.0.89:18443 in the environment (shell + IDE + CI)
# and the mkcert CA trusted on the machine. With those set, bnd_lints is pulled
# like any dependency; its deps resolve in a separate isolate (no dev_dependency,
# no overrides). The plugins: block does not yet support hosted:/git: sources.
plugins:
  bnd_lints:
    version: ^0.2.0
    # Full rule set. bnd_lints' warning-severity rules auto-enable; these ~14
    # lint-severity rules are off by default and are turned on here. Keys are the
    # full rule codes (the `bnd-lints-` prefix is required).
    diagnostics:
      bnd-lints-no_hardcoded_colors: true
      bnd-lints-no_hardcoded_keys: true
      bnd-lints-no_legacy_riverpod_providers: true
      bnd-lints-no_tier_strategy_conflict: true
      bnd-lints-prefer_do_notation_for_either_chains: true
      bnd-lints-prefer_either_accumulation_for_validation_errors: true
      bnd-lints-prefer_hook_consumer_widget_in_flutter: true
      bnd-lints-prefer_typedef_for_function_signatures: true
      bnd-lints-require_canonical_annotation_order: true
      bnd-lints-require_equatable_on_multi_field_domain_classes: true
      bnd-lints-require_final_fields_in_domain: true
      bnd-lints-require_final_on_sealed_subclasses: true
      bnd-lints-require_immutable_annotation_on_value_classes: true
      bnd-lints-require_throws_annotation_on_throwing_fns: true

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Exhaustiveness is a feature here — never silently fall through.
    non_exhaustive_switch_statement: error

linter:
  rules:
    # Intentionally disabled (very_good_analysis enables it): the barrel exports
    # are ordered innermost-layer-first as a reading guide, not alphabetically.
    directives_ordering: false
